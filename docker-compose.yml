version: '3.8'

services:
  # Base de données MySQL
  mysql:
    image: mysql:8.0
    container_name: bourbon-morelli-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: bourbon_morelli
      MYSQL_USER: ${DB_USER:-bourbon_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bourbon_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - bourbon-network

  # Backend Node.js
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bourbon-morelli-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_USER: ${DB_USER:-bourbon_user}
      DB_PASSWORD: ${DB_PASSWORD:-bourbon_password}
      DB_NAME: bourbon_morelli
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-https://bourbonmorelli.com}
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - bourbon-network

  # Frontend React (Nginx)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: bourbon-morelli-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - bourbon-network

  # Redis pour le cache et les sessions
  redis:
    image: redis:7-alpine
    container_name: bourbon-morelli-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bourbon-network

volumes:
  mysql_data:
  redis_data:

networks:
  bourbon-network:
    driver: bridge
